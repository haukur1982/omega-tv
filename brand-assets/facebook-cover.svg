<!--
  Omega — Facebook cover (v1).

  Dimensions: 820 × 360 (standard Facebook cover, works on desktop and
  mobile). Upload to Facebook as PNG at 2x resolution (1640 × 720) for
  crispness on retina displays.

  Composition:
    - Night Black background (flat, no gradients)
    - Horizontal lockup centered horizontally, biased slightly up to
      account for the profile-photo overlap zone (bottom-left on desktop)
    - Tiny heritage line "KRISTILEGT SJÓNVARP · SÍÐAN 1992" in the
      lower-right, at 55% opacity, as institutional grounding

  Uses currentColor for everything gold. Background is fixed.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" fill="none">
  <!-- Night Black background -->
  <rect width="820" height="360" fill="#14120F"/>

  <!-- Horizontal lockup, centered, scaled to 500px wide (60% of cover) -->
  <g transform="translate(160, 90)" color="#E9A860">
    <g transform="scale(0.5)">
      <defs>
        <mask id="fbCut" maskUnits="userSpaceOnUse">
          <rect width="1000" height="300" fill="white"/>
          <rect x="0" y="212" width="240" height="6" fill="black"/>
        </mask>
      </defs>
      <g mask="url(#fbCut)">
        <g transform="translate(0, 10)">
          <circle cx="120" cy="120" r="104" stroke="currentColor" stroke-width="22" fill="none"/>
          <text x="120" y="202" fill="currentColor"
                font-family="'Fraunces', 'Newsreader', Georgia, serif"
                font-size="235" font-weight="700" text-anchor="middle">Ω</text>
        </g>
      </g>
      <text x="248" y="212" fill="currentColor"
            font-family="'Fraunces', 'Newsreader', Georgia, serif"
            font-size="235" font-weight="700" letter-spacing="-0.005em">MEGA</text>
      <text x="252" y="262" fill="currentColor"
            font-family="Inter, -apple-system, 'Helvetica Neue', sans-serif"
            font-size="26" font-weight="600" letter-spacing="0.22em">LJÓS OG VON FYRIR ÍSLAND</text>
    </g>
  </g>

  <!-- Heritage line, lower right, subtle -->
  <text x="790" y="336" fill="#E9A860" fill-opacity="0.55"
        font-family="Inter, sans-serif" font-size="10" font-weight="600"
        letter-spacing="0.3em" text-anchor="end">KRISTILEGT SJÓNVARP · SÍÐAN 1992</text>
</svg>
